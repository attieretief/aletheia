<!DOCTYPE html>
<html lang="{{ site.lang | default: 'af' }}">

  {% include head.html %}

  <body>

    <div>

      <header class="clearfix">

        {% include header.html %}

        <!-- Language toggle (fixed floating button) -->
        <div class="lang-toggle-fixed">
          <button class="lang-toggle-btn" onclick="toggleLang()" aria-label="Toggle language">
            <span class="lang-af">English</span><span class="lang-en">Afrikaans</span>
          </button>
        </div>

        <div class="container mx-auto px-2 mt-4 mb-2 clearfix header-text">
          <h1 class="h0 inline-block py-2 mt-4 header-title">{{ site.title }}</h1>
          <div class="col-1 sm-width-full border-top-thick"></div>
          <div class="clearfix mb-2 py-1">
            <p class="h2 lh-condensed font-smoothing">
              <span class="lang-af">{{ site.data.i18n.subtitle.af }}</span><span class="lang-en">{{ site.data.i18n.subtitle.en }}</span>
            </p>
            </div>
          </div>

          <div class="container mx-auto px-2 prose" itemprop="articleBody">
              {{ content }}
          </div>

        </div>
      </header>

    </div>

    {% include footer.html %}

    <script>
      function toggleMobileMenu() {
        var mobileMenu = document.querySelector('.mobile-nav-menu');
        mobileMenu.classList.toggle('active');
      }

      // Close mobile menu when clicking outside or on close button
      document.addEventListener('DOMContentLoaded', function() {
        var mobileMenu = document.querySelector('.mobile-nav-menu');

        // Close when clicking on the close button (x)
        mobileMenu.addEventListener('click', function(e) {
          if (e.target === mobileMenu || e.target.classList.contains('mobile-nav-menu')) {
            mobileMenu.classList.remove('active');
          }
        });

        // Close when clicking on a link
        var mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(function(link) {
          link.addEventListener('click', function() {
            mobileMenu.classList.remove('active');
          });
        });
      });
    </script>

  </body>

</html>
