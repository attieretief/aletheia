# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Aletheia
subtitle: "'n Soeke na Waarheid in die Christelike geloof"
description: "Aletheia is 'n Afrikaans Gereformeerde kursusreeks wat geloof, filosofie en wetenskap saamweef — 'n soeke na waarheid vir denkende gelowiges."
# GitHub Pages will automatically set baseurl to the repository name
# For local development, use empty baseurl
baseurl: "" # root of custom domain, no subpath needed
url: "https://aletheia.attieretief.com" # custom domain
github_repo: aletheia # the GitHub repo name for your project
github_username: attieretief # your GitHub username
owner: Attie Retief
lang: af

# SEO & social
author:
  name: Attie Retief
logo: /assets/images/aletheia.svg
image: /assets/images/aletheia-og.png
twitter:
  card: summary_large_image

# Set theme color here
# Choose from: black (default), blue, gray, magenta, orange, red, white, and yellow.
theme_color: light

# Build settings
markdown: kramdown

# GitHub Pages only supports these plugins:
# https://pages.github.com/versions/
plugins:
  - jekyll-default-layout
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-relative-links
  - jekyll-titles-from-headings
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - ROADMAP.md
  - build_presentation.py
  - "*.pptx"

collections:
  courses:
    output: true
    sort_by: lesson
